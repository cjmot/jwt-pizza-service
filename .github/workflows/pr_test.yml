name: PR Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: Build and Run Tests
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    services:
      mysql:
        image: mysql:8.0.29
        env:
          MYSQL_ROOT_PASSWORD: tempdbpassword
          MYSQL_DATABASE: pizza
        ports:
          - '3306:3306'
        options: >-
          --health-cmd "mysqladmin ping -ptempdbpassword" --health-interval 10s --health-start-period 10s --health-timeout 5s --health-retries 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Write config file
        run: |
          echo "module.exports = {
            jwtSecret: '${{ secrets.JWT_SECRET }}',
            db: {
              connection: {
                host: '127.0.0.1',
                user: 'root',
                password: 'tempdbpassword',
                database: 'pizza',
                connectTimeout: 60000,
              },
              listPerPage: 10,
            },
            factory: {
              url: 'https://pizza-factory.cs329.click',
              apiKey: '${{ secrets.FACTORY_API_KEY }}',
            },
            metrics: {
              source: 'jwt-pizza-service',
              endpointUrl: '${{ secrets.METRICS_ENDPOINT_URL }}',
              apiKey: '${{ secrets.METRICS_API_KEY }}',
              accountId: '${{ secrets.METRICS_ACCOUNT_ID }}',
            },
            logging:    {
              source: 'jwt-pizza-service',
              accountId: ${{ secrets.LOGGING_ACCOUNT_ID }},
              endpointUrl: '${{ secrets.LOGGING_ENDPOINT_URL }}',
              apiKey: '${{ secrets.LOGGING_API_KEY }}',
            },
          };" > src/config.js

      - name: Tests
        run: npm test
